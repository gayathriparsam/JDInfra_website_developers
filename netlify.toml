[build]
  command = "npm run build"
  publish = ".output/public"

# TanStack Start with nitro `netlify` preset emits the SSR function under
# .netlify/functions-internal/server — send all non-asset requests there.
[[redirects]]
  from = "/*"
  to = "/.netlify/functions-internal/server/server"
  status = 200
  force = false
